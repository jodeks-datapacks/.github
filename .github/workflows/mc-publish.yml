name: Publish Datapack
on:
  workflow_call:
    secrets:
      MODRINTH_TOKEN:
        required: true
      CURSEFORGE_TOKEN:
        required: true
      DISCORD_WEBHOOK_URL:
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Read publish.json
        id: meta
        run: |
          echo "project_id=$(jq -r '.project_id' publish.json)" >> $GITHUB_OUTPUT
          echo "curseforge_project_id=$(jq -r '.curseforge_project_id // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "curseforge_slug=$(jq -r '.curseforge_slug // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "loaders=$(jq -r '.loaders | join("\n")' publish.json)" >> $GITHUB_OUTPUT
          echo 'game_versions<<EOF' >> $GITHUB_OUTPUT
          jq -r '.game_versions[]' publish.json >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo "dependencies=$(jq -r '.dependencies // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "version_type=$(jq -r '.version_type // "release"' publish.json)" >> $GITHUB_OUTPUT
          echo "discord_role_id=$(jq -r '.discord_role_id // ""' publish.json)" >> $GITHUB_OUTPUT
          
      - name: Zip datapack
        run: |
          zip -r "${{ github.event.repository.name }}-${{ github.event.release.tag_name }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "publish.json"
      
      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.meta.outputs.project_id }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ steps.meta.outputs.curseforge_project_id }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: "*.zip"
          name: ${{ github.event.repository.name }} ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          version-type: ${{ steps.meta.outputs.version_type }}
          changelog: ${{ github.event.release.body }}
          loaders: ${{ steps.meta.outputs.loaders }}
          game-versions: ${{ steps.meta.outputs.game_versions }}
          dependencies: ${{ steps.meta.outputs.dependencies }}
      
      - name: Get project icon
        id: icon
        run: |
          ICON_URL=$(curl -s "https://api.modrinth.com/v2/project/${{ steps.meta.outputs.project_id }}" | jq -r '.icon_url // ""')
          echo "url=${ICON_URL}" >> $GITHUB_OUTPUT
      
      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.repository.name }}"
          PROJECT_ID="${{ steps.meta.outputs.project_id }}"
          CF_SLUG="${{ steps.meta.outputs.curseforge_slug }}"
          MC_VERSIONS_RAW=$(echo "${{ steps.meta.outputs.game_versions }}" | sort -V)
          MC_FIRST=$(echo "$MC_VERSIONS_RAW" | head -n1)
          MC_LAST=$(echo "$MC_VERSIONS_RAW" | tail -n1)
          if [ "$MC_FIRST" = "$MC_LAST" ]; then
            MC_VERSIONS="$MC_FIRST"
          else
            MC_VERSIONS="${MC_FIRST} - ${MC_LAST}"
          fi
          CHANGELOG=$(echo "${{ github.event.release.body }}" | jq -Rs . | sed 's/^"//;s/"$//')
          ROLE_ID="${{ steps.meta.outputs.discord_role_id }}"
          ICON_URL="${{ steps.icon.outputs.url }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          PAYLOAD=$(cat <<EOF
          {
            "content": "<@&${ROLE_ID}>",
            "embeds": [{
              "title": "${NAME} ${VERSION}",
              "description": "A new version has been released!",
              "url": "https://modrinth.com/datapack/${PROJECT_ID}/version/${VERSION}",
              "color": 1825130,
              "fields": [
                {
                  "name": "Changelog",
                  "value": "${CHANGELOG}",
                  "inline": false
                },
                {
                  "name": "Minecraft Versions",
                  "value": "\`${MC_VERSIONS}\`",
                  "inline": false
                },
                {
                  "name": "Downloads",
                  "value": "[Modrinth](https://modrinth.com/datapack/${PROJECT_ID}/version/${VERSION}) • [CurseForge](https://www.curseforge.com/minecraft/data-packs/${CF_SLUG})",
                  "inline": false
                }
              ],
              "thumbnail": {
                "url": "${ICON_URL}"
              },
              "footer": {
                "text": "Published to Modrinth & CurseForge"
              },
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOF
          )
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

      - name: Update Modrinth description from README
        run: |
          BODY=$(cat README.md | jq -Rs .)
          curl -X PATCH "https://api.modrinth.com/v2/project/${{ steps.meta.outputs.project_id }}" \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": ${BODY}}"

      - name: Read mod project id
        id: mod_meta
        run: |
          MOD_CF_ID=$(jq -r '.curseforge_mod_project_id // ""' publish.json)
          echo "curseforge_mod_project_id=${MOD_CF_ID}" >> $GITHUB_OUTPUT

      - name: Wait for manual Modrinth JAR
        if: steps.mod_meta.outputs.curseforge_mod_project_id != ''
        run: sleep 180

      - name: Fetch JAR from Modrinth and upload to CurseForge mod project
        if: steps.mod_meta.outputs.curseforge_mod_project_id != ''
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          PROJECT_ID="${{ steps.meta.outputs.project_id }}"
          MOD_CF_ID="${{ steps.mod_meta.outputs.curseforge_mod_project_id }}"

          # Search modrinth version by tag
          echo "Fetching Modrinth version for tag ${VERSION}..."
          VERSION_DATA=$(curl -sf "https://api.modrinth.com/v2/project/${PROJECT_ID}/version" \
            | jq --arg v "${VERSION}+mod" '[.[] | select(.version_number == $v)] | first')

          if [ -z "$VERSION_DATA" ] || [ "$VERSION_DATA" = "null" ]; then
            echo "Error: No Modrinth version found for tag ${VERSION}"
            exit 1
          fi

          # Search for JAR File
          JAR_URL=$(echo "$VERSION_DATA" | jq -r '.files[] | select(.filename | endswith(".jar")) | .url' | head -n1)
          JAR_NAME=$(echo "$VERSION_DATA" | jq -r '.files[] | select(.filename | endswith(".jar")) | .filename' | head -n1)

          if [ -z "$JAR_URL" ] || [ "$JAR_URL" = "null" ]; then
            echo "Error: No JAR file found in Modrinth version ${VERSION}"
            exit 1
          fi

          echo "Downloading JAR: ${JAR_NAME}"
          curl -L -o "${JAR_NAME}" "${JAR_URL}"

          # Get Game versions + loaders from publish.json
          MC_VERSIONS=$(jq -r '[.game_versions[]]' publish.json)
          
          # Get CurseForge game version IDs
          echo "Fetching CurseForge game version IDs..."
          CF_VERSIONS_RAW=$(curl -sf \
            -H "x-api-key: ${CURSEFORGE_TOKEN}" \
            "https://minecraft.curseforge.com/api/game/versions")
          
          CF_VERSION_IDS=$(echo "$MC_VERSIONS" | jq -r '.[]' | while read -r MC_VER; do
            ID=$(echo "$CF_VERSIONS_RAW" | jq --arg v "$MC_VER" '.[] | select(.name == $v) | .id')
            if [ -n "$ID" ]; then echo "$ID"; fi
          done | jq -Rs '[split("\n")[] | select(. != "") | tonumber]')

          # Map release type
          VERSION_TYPE=$(jq -r '.version_type // "release"' publish.json)
          case "$VERSION_TYPE" in
            release) CF_RELEASE_TYPE="release" ;;
            beta)    CF_RELEASE_TYPE="beta" ;;
            alpha)   CF_RELEASE_TYPE="alpha" ;;
            *)       CF_RELEASE_TYPE="release" ;;
          esac

          CHANGELOG="${{ github.event.release.body }}"

          # Build metadata JSON
          METADATA=$(jq -n \
            --arg changelog "$CHANGELOG" \
            --arg releaseType "$CF_RELEASE_TYPE" \
            --argjson gameVersions "$CF_VERSION_IDS" \
            '{
              changelog: $changelog,
              changelogType: "markdown",
              releaseType: $releaseType,
              gameVersions: $gameVersions
            }')

          echo "Uploading JAR to CurseForge mod project ${MOD_CF_ID}..."
          RESPONSE=$(curl -sf \
            -H "x-api-key: ${CURSEFORGE_TOKEN}" \
            -F "metadata=${METADATA};type=application/json" \
            -F "file=@${JAR_NAME}" \
            "https://minecraft.curseforge.com/api/projects/${MOD_CF_ID}/upload-file")

          echo "CurseForge response: ${RESPONSE}"
          CF_FILE_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$CF_FILE_ID" ]; then
            echo "Error: Upload failed"
            exit 1
          fi
          echo "Successfully uploaded JAR to CurseForge, file ID: ${CF_FILE_ID}"
