name: Publish Datapack
on:
  workflow_call:
    secrets:
      MODRINTH_TOKEN:
        required: true
      CURSEFORGE_TOKEN:
        required: true
      DISCORD_WEBHOOK_URL:
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Read publish.json
        id: meta
        run: |
          echo "project_id=$(jq -r '.project_id' publish.json)" >> $GITHUB_OUTPUT
          echo "curseforge_project_id=$(jq -r '.curseforge_project_id // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "curseforge_mod_project_id=$(jq -r '.curseforge_mod_project_id // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "curseforge_slug=$(jq -r '.curseforge_slug // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "loaders=$(jq -r '.loaders | join("\n")' publish.json)" >> $GITHUB_OUTPUT
          echo 'game_versions<<EOF' >> $GITHUB_OUTPUT
          jq -r '.game_versions[]' publish.json >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo "dependencies=$(jq -r '.dependencies // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "version_type=$(jq -r '.version_type // "release"' publish.json)" >> $GITHUB_OUTPUT
          echo "discord_role_id=$(jq -r '.discord_role_id // ""' publish.json)" >> $GITHUB_OUTPUT
          
      - name: Zip datapack
        run: |
          zip -r "${{ github.event.repository.name }}-${{ github.event.release.tag_name }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "publish.json"
      
      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.meta.outputs.project_id }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ steps.meta.outputs.curseforge_project_id }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: "*.zip"
          name: ${{ github.event.repository.name }} ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          version-type: ${{ steps.meta.outputs.version_type }}
          changelog: ${{ github.event.release.body }}
          loaders: ${{ steps.meta.outputs.loaders }}
          game-versions: ${{ steps.meta.outputs.game_versions }}
          dependencies: ${{ steps.meta.outputs.dependencies }}
      
      - name: Fetch project metadata from Modrinth
        id: modrinth
        run: |
          PROJECT_DATA=$(curl -sf "https://api.modrinth.com/v2/project/${{ steps.meta.outputs.project_id }}")
          
          ICON_URL=$(echo "$PROJECT_DATA" | jq -r '.icon_url // ""')
          SLUG=$(echo "$PROJECT_DATA" | jq -r '.slug')
          PACK_NAME=$(echo "$PROJECT_DATA" | jq -r '.title')
          DESCRIPTION=$(echo "$PROJECT_DATA" | jq -r '.description')
          LICENSE=$(echo "$PROJECT_DATA" | jq -r '.license.id // "All-Rights-Reserved"')
          
          # Derive mod_id from slug (hyphens -> underscores, lowercase only)
          MOD_ID=$(echo "$SLUG" | tr '-' '_' | tr '[:upper:]' '[:lower:]')
          
          echo "icon_url=${ICON_URL}" >> $GITHUB_OUTPUT
          echo "slug=${SLUG}" >> $GITHUB_OUTPUT
          echo "mod_id=${MOD_ID}" >> $GITHUB_OUTPUT
          echo "pack_name=${PACK_NAME}" >> $GITHUB_OUTPUT
          echo "description=${DESCRIPTION}" >> $GITHUB_OUTPUT
          echo "license=${LICENSE}" >> $GITHUB_OUTPUT

      - name: Check for noping flag
        id: ping_check
        run: |
          BODY="${{ github.event.release.body }}"
          if echo "$BODY" | grep -qi '\[noping\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Notify Discord
        if: success() && steps.ping_check.outputs.skip == 'false'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.repository.name }}"
          PROJECT_ID="${{ steps.meta.outputs.project_id }}"
          CF_SLUG="${{ steps.meta.outputs.curseforge_slug }}"
          MC_VERSIONS_RAW=$(echo "${{ steps.meta.outputs.game_versions }}" | sort -V)
          MC_FIRST=$(echo "$MC_VERSIONS_RAW" | head -n1)
          MC_LAST=$(echo "$MC_VERSIONS_RAW" | tail -n1)
          if [ "$MC_FIRST" = "$MC_LAST" ]; then
            MC_VERSIONS="$MC_FIRST"
          else
            MC_VERSIONS="${MC_FIRST} - ${MC_LAST}"
          fi
          CHANGELOG=$(echo "${{ github.event.release.body }}" | sed 's/\[noping\]//gi' | sed '/^[[:space:]]*$/d' | jq -Rs . | sed 's/^"//;s/"$//')
          ROLE_ID="${{ steps.meta.outputs.discord_role_id }}"
          ICON_URL="${{ steps.modrinth.outputs.icon_url }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          PAYLOAD=$(cat <<EOF
          {
            "content": "<@&${ROLE_ID}>",
            "embeds": [{
              "title": "${NAME} ${VERSION}",
              "description": "A new version has been released!",
              "url": "https://modrinth.com/datapack/${PROJECT_ID}/version/${VERSION}",
              "color": 1825130,
              "fields": [
                {
                  "name": "Changelog",
                  "value": "${CHANGELOG}",
                  "inline": false
                },
                {
                  "name": "Minecraft Versions",
                  "value": "\`${MC_VERSIONS}\`",
                  "inline": false
                },
                {
                  "name": "Downloads",
                  "value": "[Modrinth](https://modrinth.com/datapack/${PROJECT_ID}/version/${VERSION}) • [CurseForge](https://www.curseforge.com/minecraft/data-packs/${CF_SLUG})",
                  "inline": false
                }
              ],
              "thumbnail": {
                "url": "${ICON_URL}"
              },
              "footer": {
                "text": "Published to Modrinth & CurseForge"
              },
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOF
          )
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

      - name: Update Modrinth description from README
        run: |
          BODY=$(cat README.md | jq -Rs .)
          curl -X PATCH "https://api.modrinth.com/v2/project/${{ steps.meta.outputs.project_id }}" \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": ${BODY}}"

      # ── Mod Bundling & Upload ──────────────────────────────────────────
      - name: Bundle datapack as mod JAR
        if: steps.meta.outputs.curseforge_mod_project_id != ''
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          MOD_ID="${{ steps.modrinth.outputs.mod_id }}"
          SLUG="${{ steps.modrinth.outputs.slug }}"
          PACK_NAME="${{ steps.modrinth.outputs.pack_name }}"
          DESCRIPTION="${{ steps.modrinth.outputs.description }}"
          LICENSE="${{ steps.modrinth.outputs.license }}"
          ICON_NAME="${SLUG}_pack.png"
          PROJECT_URL="https://modrinth.com/datapack/${SLUG}"
          PROJECT_ID="${{ steps.meta.outputs.project_id }}"

          ZIP_FILE="${{ github.event.repository.name }}-${{ github.event.release.tag_name }}.zip"
          JAR_FILE="${SLUG}-${VERSION}.jar"

          # Extract the datapack zip
          mkdir mod-temp
          unzip "${ZIP_FILE}" -d mod-temp

          # Copy pack icon for mod loaders
          if [ -f "mod-temp/pack.png" ]; then
            cp mod-temp/pack.png "mod-temp/${ICON_NAME}"
          fi

          # ── Fabric ──
          cat > mod-temp/fabric.mod.json << FABRIC_EOF
          {
            "schemaVersion": 1,
            "id": "${MOD_ID}",
            "version": "${VERSION}",
            "name": "${PACK_NAME}",
            "description": "${DESCRIPTION}",
            "authors": ["jodek"],
            "contact": {
              "homepage": "${PROJECT_URL}"
            },
            "license": "${LICENSE}",
            "icon": "${ICON_NAME}",
            "environment": "*",
            "depends": {
              "fabric-resource-loader-v0": "*"
            }
          }
          FABRIC_EOF

          # ── Quilt ──
          cat > mod-temp/quilt.mod.json << QUILT_EOF
          {
            "schema_version": 1,
            "quilt_loader": {
              "group": "com.modrinth",
              "id": "${MOD_ID}",
              "version": "${VERSION}",
              "metadata": {
                "name": "${PACK_NAME}",
                "description": "${DESCRIPTION}",
                "contributors": {
                  "jodek": "Owner"
                },
                "contact": {
                  "homepage": "${PROJECT_URL}"
                },
                "icon": "${ICON_NAME}"
              },
              "intermediate_mappings": "net.fabricmc:intermediary",
              "depends": [
                {
                  "id": "quilt_resource_loader",
                  "versions": "*",
                  "unless": "fabric-resource-loader-v0"
                }
              ]
            }
          }
          QUILT_EOF

          # ── Forge ──
          mkdir -p mod-temp/META-INF
          cat > mod-temp/META-INF/mods.toml << FORGE_EOF
          modLoader = 'lowcodefml'
          loaderVersion = '[40,)'
          license = '${LICENSE}'
          showAsResourcePack = false

          [[mods]]
          modId = '${MOD_ID}'
          version = '${VERSION}'
          displayName = '${PACK_NAME}'
          description = '${DESCRIPTION}'
          logoFile = '${ICON_NAME}'
          updateJSONURL = 'https://api.modrinth.com/updates/${PROJECT_ID}/forge_updates.json'
          credits = 'Generated by GitHub Actions'
          authors = 'jodek'
          displayURL = '${PROJECT_URL}'
          FORGE_EOF

          # ── NeoForge ──
          cat > mod-temp/META-INF/neoforge.mods.toml << NEOFORGE_EOF
          modLoader = 'lowcodefml'
          loaderVersion = '[1,)'
          license = '${LICENSE}'
          showAsResourcePack = false

          [[mods]]
          modId = '${MOD_ID}'
          version = '${VERSION}'
          displayName = '${PACK_NAME}'
          description = '${DESCRIPTION}'
          logoFile = '${ICON_NAME}'
          updateJSONURL = 'https://api.modrinth.com/updates/${PROJECT_ID}/forge_updates.json?neoforge=only'
          credits = 'Generated by GitHub Actions'
          authors = 'jodek'
          displayURL = '${PROJECT_URL}'
          NEOFORGE_EOF

          # Package as JAR
          cd mod-temp
          jar cf "../${JAR_FILE}" .
          cd ..
          rm -rf mod-temp

          echo "jar_file=${JAR_FILE}" >> $GITHUB_OUTPUT
        id: bundle

      - name: Publish mod JAR to Modrinth
        if: steps.meta.outputs.curseforge_mod_project_id != ''
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          PROJECT_ID="${{ steps.meta.outputs.project_id }}"
          JAR_FILE="${{ steps.bundle.outputs.jar_file }}"
          VERSION_TYPE="${{ steps.meta.outputs.version_type }}"
          CHANGELOG="${{ github.event.release.body }}"

          # Build game_versions JSON array
          GAME_VERSIONS=$(jq -c '.game_versions' publish.json)

          # Mod loaders for the JAR
          MOD_LOADERS='["fabric","quilt","forge","neoforge"]'

          # Create version via Modrinth API
          METADATA=$(jq -n \
            --arg name "${{ github.event.repository.name }} ${VERSION} (Mod)" \
            --arg version_number "${VERSION}+mod" \
            --arg changelog "$CHANGELOG" \
            --arg version_type "$VERSION_TYPE" \
            --argjson game_versions "$GAME_VERSIONS" \
            --argjson loaders "$MOD_LOADERS" \
            --arg project_id "$PROJECT_ID" \
            '{
              name: $name,
              version_number: $version_number,
              changelog: $changelog,
              version_type: $version_type,
              game_versions: $game_versions,
              loaders: $loaders,
              project_id: $project_id,
              featured: false,
              dependencies: [],
              file_parts: ["file"]
            }')

          RESPONSE=$(curl -sf -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -F "data=${METADATA};type=application/json" \
            -F "file=@${JAR_FILE}")

          MODRINTH_VERSION_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "Published mod JAR to Modrinth, version ID: ${MODRINTH_VERSION_ID}"

      - name: Upload mod JAR to CurseForge
        if: steps.meta.outputs.curseforge_mod_project_id != ''
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          JAR_FILE="${{ steps.bundle.outputs.jar_file }}"
          MOD_CF_ID="${{ steps.meta.outputs.curseforge_mod_project_id }}"
          CHANGELOG="${{ github.event.release.body }}"

          # Get CurseForge game version list
          CF_VERSIONS_RAW=$(curl -s \
            -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
            "https://minecraft.curseforge.com/api/game/versions")

          # Map Minecraft versions to CurseForge IDs
          MC_VERSIONS=$(jq -c '.game_versions' publish.json)
          CF_VERSION_IDS=$(echo "$MC_VERSIONS" | jq -r '.[]' | while read -r MC_VER; do
            ID=$(echo "$CF_VERSIONS_RAW" | jq --arg v "$MC_VER" '[.[] | select(.name == $v and .gameVersionTypeID == 77784)] | first | .id')
            if [ -n "$ID" ] && [ "$ID" != "null" ]; then echo "$ID"; fi
          done | jq -Rs '[split("\n")[] | select(. != "") | tonumber]')

          # Map mod loaders to CurseForge IDs
          LOADER_IDS=$(echo '["fabric","quilt","forge","neoforge"]' | jq -r '.[]' | while read -r LOADER; do
            ID=$(echo "$CF_VERSIONS_RAW" | jq --arg l "$LOADER" '[.[] | select((.name | ascii_downcase) == ($l | ascii_downcase))] | first | .id')
            if [ -n "$ID" ] && [ "$ID" != "null" ]; then echo "$ID"; fi
          done | jq -Rs '[split("\n")[] | select(. != "") | tonumber]')

          # Merge version + loader IDs
          ALL_VERSION_IDS=$(echo "$CF_VERSION_IDS $LOADER_IDS" | jq -s 'add')

          # Map release type
          VERSION_TYPE=$(jq -r '.version_type // "release"' publish.json)
          case "$VERSION_TYPE" in
            release) CF_RELEASE_TYPE="release" ;;
            beta)    CF_RELEASE_TYPE="beta" ;;
            alpha)   CF_RELEASE_TYPE="alpha" ;;
            *)       CF_RELEASE_TYPE="release" ;;
          esac

          METADATA=$(jq -n \
            --arg changelog "$CHANGELOG" \
            --arg releaseType "$CF_RELEASE_TYPE" \
            --argjson gameVersions "$ALL_VERSION_IDS" \
            '{
              changelog: $changelog,
              changelogType: "markdown",
              releaseType: $releaseType,
              gameVersions: $gameVersions
            }')

          echo "Uploading mod JAR to CurseForge project ${MOD_CF_ID}..."
          RAW_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
            -F "metadata=${METADATA};type=application/json" \
            -F "file=@${JAR_FILE}" \
            "https://minecraft.curseforge.com/api/projects/${MOD_CF_ID}/upload-file")

          HTTP_CODE=$(echo "$RAW_RESPONSE" | tail -n1 | sed 's/HTTP_CODE://')
          RESPONSE=$(echo "$RAW_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Error: CurseForge upload failed with HTTP ${HTTP_CODE}"
            echo "Response: ${RESPONSE}"
            exit 1
          fi

          CF_FILE_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          echo "Successfully uploaded mod JAR to CurseForge, file ID: ${CF_FILE_ID}"
