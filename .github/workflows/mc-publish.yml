name: Publish Datapack
on:
  workflow_call:
    secrets:
      MODRINTH_TOKEN:
        required: true
      CURSEFORGE_TOKEN:
        required: true
      DISCORD_WEBHOOK_URL:
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Read publish.json
        id: meta
        run: |
          echo "modrinth_id=$(jq -r '.modrinth_id' publish.json)" >> $GITHUB_OUTPUT
          echo "curseforge_id=$(jq -r '.curseforge_id // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "curseforge_mod_id=$(jq -r '.curseforge_mod_id // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "curseforge_slug=$(jq -r '.curseforge_slug // ""' publish.json)" >> $GITHUB_OUTPUT
          echo "loaders=$(jq -r '.loaders | join("\n")' publish.json)" >> $GITHUB_OUTPUT
          echo 'game_versions<<EOF' >> $GITHUB_OUTPUT
          jq -r '.game_versions[]' publish.json >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo 'dependencies_datapack<<EOF' >> $GITHUB_OUTPUT
          jq -r '.dependencies.datapack[]? // empty' publish.json >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo 'dependencies_mod<<EOF' >> $GITHUB_OUTPUT
          jq -r '.dependencies.mod[]? // empty' publish.json >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo "version_type=$(jq -r '.version_type // "release"' publish.json)" >> $GITHUB_OUTPUT
          echo "discord_role_id=$(jq -r '.discord_role_id // ""' publish.json)" >> $GITHUB_OUTPUT
          
      - name: Zip datapack
        run: |
          zip -r "${{ github.event.repository.name }}-${{ github.event.release.tag_name }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "publish.json"
      
      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.meta.outputs.modrinth_id }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ steps.meta.outputs.curseforge_id }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: "*.zip"
          name: ${{ github.event.repository.name }} ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          version-type: ${{ steps.meta.outputs.version_type }}
          changelog: ${{ github.event.release.body }}
          loaders: ${{ steps.meta.outputs.loaders }}
          game-versions: ${{ steps.meta.outputs.game_versions }}
          dependencies: ${{ steps.meta.outputs.dependencies_datapack }}
      
      - name: Fetch project metadata from Modrinth
        id: modrinth
        run: |
          PROJECT_DATA=$(curl -sf "https://api.modrinth.com/v2/project/${{ steps.meta.outputs.modrinth_id }}")
          
          ICON_URL=$(echo "$PROJECT_DATA" | jq -r '.icon_url // ""')
          SLUG=$(echo "$PROJECT_DATA" | jq -r '.slug')
          PACK_NAME=$(echo "$PROJECT_DATA" | jq -r '.title')
          DESCRIPTION=$(echo "$PROJECT_DATA" | jq -r '.description')
          LICENSE=$(echo "$PROJECT_DATA" | jq -r '.license.id // "All-Rights-Reserved"')
          SOURCE_URL=$(echo "$PROJECT_DATA" | jq -r '.source_url // ""')
          ISSUES_URL=$(echo "$PROJECT_DATA" | jq -r '.issues_url // ""')
          
          MOD_ID=$(echo "$SLUG" | tr '-' '_' | tr '[:upper:]' '[:lower:]')
          
          echo "icon_url=${ICON_URL}" >> $GITHUB_OUTPUT
          echo "slug=${SLUG}" >> $GITHUB_OUTPUT
          echo "mod_id=${MOD_ID}" >> $GITHUB_OUTPUT
          echo "license=${LICENSE}" >> $GITHUB_OUTPUT
          echo "source_url=${SOURCE_URL}" >> $GITHUB_OUTPUT
          echo "issues_url=${ISSUES_URL}" >> $GITHUB_OUTPUT

          echo 'pack_name<<EOF' >> $GITHUB_OUTPUT
          echo "$PACK_NAME" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

          echo 'description<<EOF' >> $GITHUB_OUTPUT
          echo "$DESCRIPTION" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Check for noping flag
        id: ping_check
        run: |
          BODY="${{ github.event.release.body }}"
          if echo "$BODY" | grep -qi '\[noping\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Notify Discord
        if: success() && steps.ping_check.outputs.skip == 'false'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.repository.name }}"
          modrinth_id="${{ steps.meta.outputs.modrinth_id }}"
          CF_SLUG="${{ steps.meta.outputs.curseforge_slug }}"
          MC_VERSIONS_RAW=$(echo "${{ steps.meta.outputs.game_versions }}" | sort -V)
          MC_FIRST=$(echo "$MC_VERSIONS_RAW" | head -n1)
          MC_LAST=$(echo "$MC_VERSIONS_RAW" | tail -n1)
          if [ "$MC_FIRST" = "$MC_LAST" ]; then
            MC_VERSIONS="$MC_FIRST"
          else
            MC_VERSIONS="${MC_FIRST} - ${MC_LAST}"
          fi
          CHANGELOG=$(echo "${{ github.event.release.body }}" | sed 's/\[noping\]//gi' | sed '/^[[:space:]]*$/d' | jq -Rs . | sed 's/^"//;s/"$//')
          ROLE_ID="${{ steps.meta.outputs.discord_role_id }}"
          ICON_URL="${{ steps.modrinth.outputs.icon_url }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          PAYLOAD=$(cat <<EOF
          {
            "content": "<@&${ROLE_ID}>",
            "embeds": [{
              "title": "${NAME} ${VERSION}",
              "description": "A new version has been released!",
              "url": "https://modrinth.com/datapack/${modrinth_id}/version/${VERSION}",
              "color": 1825130,
              "fields": [
                {
                  "name": "Changelog",
                  "value": "${CHANGELOG}",
                  "inline": false
                },
                {
                  "name": "Minecraft Versions",
                  "value": "\`${MC_VERSIONS}\`",
                  "inline": false
                },
                {
                  "name": "Downloads",
                  "value": "[Modrinth](https://modrinth.com/datapack/${modrinth_id}/version/${VERSION}) • [CurseForge](https://www.curseforge.com/minecraft/data-packs/${CF_SLUG})",
                  "inline": false
                }
              ],
              "thumbnail": {
                "url": "${ICON_URL}"
              },
              "footer": {
                "text": "Published to Modrinth & CurseForge"
              },
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOF
          )
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

      - name: Bundle datapack as mod JAR
        if: steps.meta.outputs.curseforge_mod_id != ''
        id: bundle
        env:
          PACK_NAME: ${{ steps.modrinth.outputs.pack_name }}
          DESCRIPTION: ${{ steps.modrinth.outputs.description }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          MOD_VERSION="1-${VERSION}"
          MOD_ID="${{ steps.modrinth.outputs.mod_id }}"
          SLUG="${{ steps.modrinth.outputs.slug }}"
          LICENSE="${{ steps.modrinth.outputs.license }}"
          ICON_NAME="${SLUG}_pack.png"
          PROJECT_URL="https://modrinth.com/datapack/${SLUG}"
          modrinth_id="${{ steps.meta.outputs.modrinth_id }}"
          SOURCE_URL="${{ steps.modrinth.outputs.source_url }}"
          ISSUES_URL="${{ steps.modrinth.outputs.issues_url }}"
          AUTHORS_JSON='["Jodek"]'
          CONTRIBUTORS_JSON='{"Jodek": "Owner"}'
          AUTHORS_STRING="Jodek"

          ZIP_FILE="${{ github.event.repository.name }}-${{ github.event.release.tag_name }}.zip"
          JAR_FILE="${SLUG}-${VERSION}.jar"

          mkdir mod-temp
          unzip "${ZIP_FILE}" -d mod-temp

          if [ -f "mod-temp/pack.png" ]; then
            cp mod-temp/pack.png "mod-temp/${ICON_NAME}"
          fi

          # Fabric
          jq -n \
            --arg id "$MOD_ID" \
            --arg version "$MOD_VERSION" \
            --arg name "$PACK_NAME" \
            --arg desc "$DESCRIPTION" \
            --arg license "$LICENSE" \
            --arg icon "$ICON_NAME" \
            --arg homepage "$PROJECT_URL" \
            --arg sources "$SOURCE_URL" \
            --arg issues "$ISSUES_URL" \
            '{
              schemaVersion: 1,
              id: $id,
              version: $version,
              name: $name,
              description: $desc,
              authors: ["Jodek"],
              contact: { homepage: $homepage, sources: $sources, issues: $issues },
              license: $license,
              icon: $icon,
              environment: "*",
              depends: { "fabric-resource-loader-v0": "*" }
            }' > mod-temp/fabric.mod.json

          # Quilt
          jq -n \
            --arg id "$MOD_ID" \
            --arg version "$MOD_VERSION" \
            --arg name "$PACK_NAME" \
            --arg desc "$DESCRIPTION" \
            --arg icon "$ICON_NAME" \
            --arg homepage "$PROJECT_URL" \
            --arg sources "$SOURCE_URL" \
            --arg issues "$ISSUES_URL" \
            '{
              schema_version: 1,
              quilt_loader: {
                group: "com.modrinth",
                id: $id,
                version: $version,
                metadata: {
                  name: $name,
                  description: $desc,
                  contributors: { "Jodek": "Owner" },
                  contact: { homepage: $homepage, sources: $sources, issues: $issues },
                  icon: $icon
                },
                intermediate_mappings: "net.fabricmc:intermediary",
                depends: [
                  { id: "quilt_resource_loader", versions: "*", unless: "fabric-resource-loader-v0" }
                ]
              }
            }' > mod-temp/quilt.mod.json
          
          mkdir -p mod-temp/META-INF

          # NeoForge
          ESCAPED_DESC=$(jq -rn --arg s "$DESCRIPTION" '$s')
          ESCAPED_NAME=$(jq -rn --arg s "$PACK_NAME" '$s')
          
          cat > mod-temp/META-INF/neoforge.mods.toml << TOML
          modLoader = 'javafml'
          loaderVersion = '[1,)'
          license = '${LICENSE}'
          showAsResourcePack = false
          mods = [
          	{ modId = '${MOD_ID}', version = '${MOD_VERSION}', displayName = ${PACK_NAME_ESCAPED}, description = ${DESCRIPTION_ESCAPED}, logoFile = '${ICON_NAME}', updateJSONURL = 'https://api.modrinth.com/updates/${modrinth_id}/forge_updates.json?neoforge=only', credits = 'Generated by Jodek with Github Actions', authors = '${AUTHORS_STRING}', displayURL = '${PROJECT_URL}' },
          ]
          issueTrackerURL = '${ISSUES_URL}'
          TOML
          
          # Forge
          cat > mod-temp/META-INF/mods.toml << TOML
          modLoader = 'lowcodefml'
          loaderVersion = '[40,)'
          license = '${LICENSE}'
          showAsResourcePack = false
          mods = [
          	{ modId = '${MOD_ID}', version = '${MOD_VERSION}', displayName = ${PACK_NAME_ESCAPED}, description = ${DESCRIPTION_ESCAPED}, logoFile = '${ICON_NAME}', updateJSONURL = 'https://api.modrinth.com/updates/${modrinth_id}/forge_updates.json', credits = 'Generated by Jodek with Github Actions', authors = '${AUTHORS_STRING}', displayURL = '${PROJECT_URL}' },
          ]
          issueTrackerURL = '${ISSUES_URL}'
          TOML

          cd mod-temp
          jar cf "../${JAR_FILE}" .
          cd ..
          rm -rf mod-temp

          echo "jar_file=${JAR_FILE}" >> $GITHUB_OUTPUT

      - name: Publish mod JAR to Modrinth & CurseForge
        if: steps.meta.outputs.curseforge_mod_id != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.meta.outputs.modrinth_id }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ steps.meta.outputs.curseforge_mod_id }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: "*.jar"
          name: ${{ github.event.repository.name }} ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}+mod
          version-type: ${{ steps.meta.outputs.version_type }}
          changelog: ${{ github.event.release.body }}
          loaders: |
            fabric
            quilt
            forge
            neoforge
          game-versions: ${{ steps.meta.outputs.game_versions }}
          dependencies: ${{ steps.meta.outputs.dependencies_mod }}
