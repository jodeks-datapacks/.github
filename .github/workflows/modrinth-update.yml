name: Update Modrinth Metadata

on:
  workflow_call:
    inputs:
      targets:
        description: 'What to update (comma-separated: icon, description, body)'
        type: string
        required: true
        default: 'icon,description,body'
    secrets:
      MODRINTH_TOKEN:
        required: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Read publish.json
        id: meta
        run: |
          MODRINTH_ID=$(jq -r '.modrinth_id' publish.json)
          echo "modrinth_id=${MODRINTH_ID}" >> $GITHUB_OUTPUT

      # ─── Icon ───

      - name: Update icon on Modrinth
        if: contains(inputs.targets, 'icon')
        run: |
          if [ ! -f "pack.png" ]; then
            echo "::error::pack.png not found in repo root"
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: image/png" \
            --data-binary @pack.png \
            "https://api.modrinth.com/v2/project/${{ steps.meta.outputs.modrinth_id }}/icon?ext=png")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Icon updated on Modrinth (HTTP $HTTP_CODE)"
          else
            echo "::error::Icon update failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      # ─── Description (Modrinth + Datapack files) ───

      - name: Get GitHub repo description
        if: contains(inputs.targets, 'description')
        id: repo_desc
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO_DESC=$(gh api "repos/${{ github.repository }}" --jq '.description // empty')

          if [ -z "$REPO_DESC" ]; then
            echo "::error::GitHub repo description is empty"
            exit 1
          fi

          echo "desc=${REPO_DESC}" >> $GITHUB_OUTPUT

      - name: Update description on Modrinth
        if: contains(inputs.targets, 'description')
        run: |
          HTTP_CODE=$(jq -n --arg desc "${{ steps.repo_desc.outputs.desc }}" '{"description": $desc}' | \
            curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @- \
              "https://api.modrinth.com/v2/project/${{ steps.meta.outputs.modrinth_id }}")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Description updated on Modrinth (HTTP $HTTP_CODE)"
          else
            echo "::error::Description update on Modrinth failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Update description in datapack files
        if: contains(inputs.targets, 'description')
        env:
          NEW_DESC: ${{ steps.repo_desc.outputs.desc }}
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          # Derive namespace from repo name: lowercase, hyphens to underscores
          NAMESPACE=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | tr '-' '_')
          export NAMESPACE

          FILES_CHANGED=0

          # ── 1. pack.mcmeta ──
          if [ -f "pack.mcmeta" ]; then
            jq --arg desc "$NEW_DESC" '
              .pack.description = [
                .pack.description[] |
                if type == "object" and (.translate // "" | endswith(".description")) then
                  .fallback = $desc
                else
                  .
                end
              ]
            ' pack.mcmeta > pack.mcmeta.tmp && mv pack.mcmeta.tmp pack.mcmeta
            echo "  ✅ pack.mcmeta updated"
            FILES_CHANGED=$((FILES_CHANGED + 1))
          else
            echo "  ⚠️ pack.mcmeta not found, skipping"
          fi

          # ── 2. Advancement JSON (data/jodek/advancement/<namespace>.json) ──
          ADV_FILE="data/jodek/advancement/${NAMESPACE}.json"
          if [ -f "$ADV_FILE" ]; then
            jq --arg desc "$NEW_DESC" '
              .display.description = [
                .display.description[] |
                if type == "object" and (.translate // "" | endswith(".description")) then
                  .fallback = $desc
                else
                  .
                end
              ]
            ' "$ADV_FILE" > "${ADV_FILE}.tmp" && mv "${ADV_FILE}.tmp" "$ADV_FILE"
            echo "  ✅ ${ADV_FILE} updated"
            FILES_CHANGED=$((FILES_CHANGED + 1))
          else
            echo "  ⚠️ ${ADV_FILE} not found, skipping"
          fi

          # ── 3. image.mcfunction (data/<namespace>/function/config/image.mcfunction) ──
          IMG_FILE="data/${NAMESPACE}/function/config/image.mcfunction"
          export IMG_FILE
          if [ -f "$IMG_FILE" ]; then
            python3 -c "
          import re, os
          
          ns = os.environ['NAMESPACE']
          desc = os.environ['NEW_DESC']
          path = os.environ['IMG_FILE']
          
          with open(path, 'r') as f:
              content = f.read()
          
          pattern = rf'(translate: \"{re.escape(ns)}\.description\", fallback: \")[^\"]*\"'
          replacement = rf'\g<1>{desc}\"'
          content = re.sub(pattern, replacement, content)
          
          with open(path, 'w') as f:
              f.write(content)
          "
            echo "  ✅ ${IMG_FILE} updated"
            FILES_CHANGED=$((FILES_CHANGED + 1))
          else
            echo "  ⚠️ ${IMG_FILE} not found, skipping"
          fi

          echo "Updated ${FILES_CHANGED} file(s)"

      - name: Commit description changes
        if: contains(inputs.targets, 'description')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No file changes to commit"
          else
            git commit -m "chore: update description to match GitHub repo"
            git push
            echo "✅ Changes committed and pushed"
          fi

      # ─── Body (README → Modrinth) ───

      - name: Update body on Modrinth
        if: contains(inputs.targets, 'body')
        run: |
          if [ ! -f "README.md" ]; then
            echo "::error::README.md not found in repo root"
            exit 1
          fi

          HTTP_CODE=$(jq -n --rawfile body README.md '{"body": $body}' | \
            curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @- \
              "https://api.modrinth.com/v2/project/${{ steps.meta.outputs.modrinth_id }}")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Body updated on Modrinth (HTTP $HTTP_CODE)"
          else
            echo "::error::Body update failed (HTTP $HTTP_CODE)"
            exit 1
          fi
