name: Add Game Version to Projects

on:
  workflow_dispatch:
    inputs:
      game_version:
        description: 'Minecraft version to add'
        required: true
        type: string
      projects:
        description: 'Comma-separated repo names, or "all"'
        required: true
        default: 'all'
        type: string

jobs:
  add-game-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4

      - name: Add game version to selected projects
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GAME_VERSION: ${{ inputs.game_version }}
          PROJECTS_INPUT: ${{ inputs.projects }}
        run: |
          set -e

          # Parse which projects to process
          ALL_PROJECTS=$(jq -c '.projects[]' projects.json)

          if [ "$PROJECTS_INPUT" = "all" ]; then
            SELECTED="$ALL_PROJECTS"
          else
            # Filter by comma separated names
            IFS=',' read -ra NAMES <<< "$PROJECTS_INPUT"
            SELECTED=""
            for NAME in "${NAMES[@]}"; do
              NAME=$(echo "$NAME" | xargs) # trim whitespace
              MATCH=$(echo "$ALL_PROJECTS" | jq -c --arg r "$NAME" 'select(.repo == $r)')
              SELECTED="$SELECTED"$'\n'"$MATCH"
            done
          fi

          echo "Processing game version: $GAME_VERSION"
          echo "---"

          while IFS= read -r PROJECT; do
            [ -z "$PROJECT" ] && continue

            REPO=$(echo "$PROJECT" | jq -r '.repo')
            MR_ID=$(echo "$PROJECT" | jq -r '.modrinth_id')
            CF_ID=$(echo "$PROJECT" | jq -r '.curseforge_id')
            CF_SLUG=$(echo "$PROJECT" | jq -r '.curseforge_slug')

            echo "→ $REPO"

            # ── MODRINTH ──────────────────────────────────────────
            # Get latest version ID
            MR_VERSION_ID=$(curl -sf \
              "https://api.modrinth.com/v2/project/${MR_ID}/version?limit=1" \
              | jq -r '.[0].id')

            if [ -z "$MR_VERSION_ID" ] || [ "$MR_VERSION_ID" = "null" ]; then
              echo "  [Modrinth] No versions found, skipping"
            else
              # Get current game versions of that version
              CURRENT_VERSIONS=$(curl -sf \
                "https://api.modrinth.com/v2/version/${MR_VERSION_ID}" \
                | jq -c '.game_versions')

              # Check if already present
              ALREADY=$(echo "$CURRENT_VERSIONS" | jq --arg v "$GAME_VERSION" 'map(select(. == $v)) | length')

              if [ "$ALREADY" -gt 0 ]; then
                echo "  [Modrinth] $GAME_VERSION already present, skipping"
              else
                NEW_VERSIONS=$(echo "$CURRENT_VERSIONS" | jq --arg v "$GAME_VERSION" '. + [$v]')
                curl -sf -X PATCH \
                  "https://api.modrinth.com/v2/version/${MR_VERSION_ID}" \
                  -H "Authorization: ${MODRINTH_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"game_versions\": ${NEW_VERSIONS}}" > /dev/null
                echo "  [Modrinth] ✓ Added $GAME_VERSION to version $MR_VERSION_ID"
              fi
            fi

            # ── CURSEFORGE ────────────────────────────────────────
            # Get the numeric game version ID for the given version string
            CF_VERSION_ID=$(curl -sf \
              "https://minecraft.curseforge.com/api/game/versions" \
              -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
              | jq --arg v "$GAME_VERSION" '.[] | select(.name == $v) | .id')

            if [ -z "$CF_VERSION_ID" ] || [ "$CF_VERSION_ID" = "null" ]; then
              echo "  [CurseForge] Version '$GAME_VERSION' not found in CurseForge game versions, skipping"
            else
              # Get latest file ID
              CF_FILE_ID=$(curl -sf \
                "https://minecraft.curseforge.com/api/projects/${CF_ID}/files?pageSize=1" \
                -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
                | jq -r '.[0].id // empty')

              if [ -z "$CF_FILE_ID" ]; then
                echo "  [CurseForge] No files found, skipping"
              else
                # Get current game versions
                CURRENT_CF_VERSIONS=$(curl -sf \
                  "https://minecraft.curseforge.com/api/projects/${CF_ID}/files/${CF_FILE_ID}" \
                  -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
                  | jq -c '.gameVersions')

                ALREADY_CF=$(echo "$CURRENT_CF_VERSIONS" | jq --arg v "$CF_VERSION_ID" 'map(select(. == ($v | tonumber))) | length')

                if [ "$ALREADY_CF" -gt 0 ]; then
                  echo "  [CurseForge] $GAME_VERSION already present, skipping"
                else
                  NEW_CF_VERSIONS=$(echo "$CURRENT_CF_VERSIONS" | jq --arg v "$CF_VERSION_ID" '. + [($v | tonumber)]')
                  curl -sf -X POST \
                    "https://minecraft.curseforge.com/api/projects/${CF_ID}/files/${CF_FILE_ID}" \
                    -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{\"fileID\": ${CF_FILE_ID}, \"gameVersions\": ${NEW_CF_VERSIONS}}" > /dev/null
                  echo "  [CurseForge] ✓ Added $GAME_VERSION to file $CF_FILE_ID"
                fi
              fi
            fi

            echo ""
          done <<< "$SELECTED"

          echo "Done!"
